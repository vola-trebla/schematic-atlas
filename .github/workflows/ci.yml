name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify generated registry is current
        run: |
          npm run build:registry
          if ! git diff --exit-code src/data/registry.generated.ts; then
            echo "::error::registry.generated.ts is out of date. Run 'npm run build:registry' and commit the result."
            exit 1
          fi

      - name: ESLint
        run: npx eslint src/

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
