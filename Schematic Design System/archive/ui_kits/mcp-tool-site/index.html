<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Schematic — A pocket inspector for MCP tools</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  body { margin: 0; min-height: 100vh; }
  /* page page-edge */
  .page-shell {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 var(--gutter);
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(20,18,12,0.04) 0 1px, transparent 1.5px),
      radial-gradient(circle at 70% 65%, rgba(20,18,12,0.03) 0 1px, transparent 1.5px),
      radial-gradient(circle at 50% 80%, rgba(20,18,12,0.03) 0 1px, transparent 1.5px);
    background-size: 7px 7px, 11px 11px, 13px 13px;
    position: relative;
  }
  /* faint vertical rules — like notebook margins */
  .page-shell::before, .page-shell::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(21,22,27,0.10);
    pointer-events: none;
  }
  .page-shell::before { left: 36px; }
  .page-shell::after  { right: 36px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../../assets/schematic.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="ToolDiagram.jsx"></script>
  <script type="text/babel" src="Install.jsx"></script>

  <script type="text/babel" src="Steps.jsx"></script>
