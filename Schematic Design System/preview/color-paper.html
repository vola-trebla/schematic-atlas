<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Color — Paper</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:180px;}</style>
</head>
<body class="card-pad">
<div class="grid-swatches" style="grid-template-columns: repeat(5,1fr);height:100%;align-content:center;">
  
    <div class="swatch">
      <div class="chip" style="background:#F2EDE2;"></div>
      <span class="var">--paper</span>
      <span class="hex">#F2EDE2</span>
      <span class="name" style="color:var(--ink-muted);">default</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#F8F4EA;"></div>
      <span class="var">--paper-bright</span>
      <span class="hex">#F8F4EA</span>
      <span class="name" style="color:var(--ink-muted);">elevated</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#E8E0CE;"></div>
      <span class="var">--paper-dim</span>
      <span class="hex">#E8E0CE</span>
      <span class="name" style="color:var(--ink-muted);">panel</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#D9CFB8;"></div>
      <span class="var">--paper-shadow</span>
      <span class="hex">#D9CFB8</span>
      <span class="name" style="color:var(--ink-muted);">grid line</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#C6B89A;"></div>
      <span class="var">--paper-edge</span>
      <span class="hex">#C6B89A</span>
      <span class="name" style="color:var(--ink-muted);">page edge</span>
    </div>
</div></body></html>
