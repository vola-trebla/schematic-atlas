<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Component — Card Variants</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:300px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;align-items:center;">
  <div style="position:relative;border:1.5px solid var(--ink);padding:18px 16px 14px;background:transparent;">
    <span style="position:absolute;top:-9px;left:14px;background:var(--paper);padding:0 6px;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;border:1.4px solid var(--ink);">[A.01]</span>
    <div style="font-family:var(--font-display);font-size:24px;line-height:1;margin-top:4px;">Plain card</div>
    <div style="font-family:var(--font-hand);font-size:13px;color:var(--ink-muted);line-height:1.45;margin-top:6px;">1.5 px stroked. No fill. Part-tag in the top-left.</div>
  </div>
  <div style="position:relative;border:1.5px solid var(--ink);padding:18px 16px;background:transparent;">
    <svg width="32" height="32" viewBox="0 0 28 28" fill="none" stroke="#15161B" style="position:absolute;top:-1px;right:-1px;">
      <path d="M 0 0 L 28 0 L 28 28 Z" fill="#F2EDE2" stroke="none"/>
      <path d="M 28 0 L 12 0 L 28 16 Z" fill="#E8E0CE" stroke="#15161B" stroke-width="1.4" stroke-linejoin="round"/>
    </svg>
    <div style="font-family:var(--font-display);font-size:24px;line-height:1;">Folded</div>
    <div style="font-family:var(--font-hand);font-size:13px;color:var(--ink-muted);line-height:1.45;margin-top:6px;">Dog-eared. Use on page-level surfaces.</div>
  </div>
  <div style="position:relative;border:1.5px solid var(--ink);padding:18px 16px;background:var(--paper);">
    <span aria-hidden="true" style="position:absolute;top:8px;left:8px;right:-8px;bottom:-8px;z-index:-1;background-image:repeating-linear-gradient(45deg,#15161B 0 1px,transparent 1px 5px);opacity:0.5;"></span>
    <div style="font-family:var(--font-display);font-size:24px;line-height:1;">Hatched</div>
    <div style="font-family:var(--font-hand);font-size:13px;color:var(--ink-muted);line-height:1.45;margin-top:6px;">Elevation = hatching shadow. Never box-shadow.</div>
  </div>
</div></body></html>
