<!doctype html>
<html lang="en">
<head>

<title>Component — Status & Indicators</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:200px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;flex-direction:column;justify-content:center;gap:12px;">
  <div class="row" style="gap:24px;">
    <span class="row-tight">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3F6E3A"><path d="M 4 13 L 10 19 L 21 6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span style="font-family:var(--font-hand);font-size:16px;">ok — 200</span>
    </span>
    <span class="row-tight">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B43A2A"><path d="M 5 5 L 19 19 M 19 5 L 5 19" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span style="font-family:var(--font-hand);font-size:16px;">failed — stream closed</span>
    </span>
    <span class="row-tight">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#26537B"><circle cx="12" cy="12" r="1.6" fill="#26537B"/><circle cx="12" cy="12" r="9" stroke-width="1.6"/></svg>
      <span style="font-family:var(--font-hand);font-size:16px;">pending</span>
    </span>

      <span style="font-family:var(--font-hand);font-size:16px;">warn — retried 3×</span>
    </span>
  </div>
  <div class="row" style="gap:10px;align-items:center;margin-top:4px;">
    <span class="label-row">progress →</span>
    <svg width="320" height="14" viewBox="0 0 320 14" fill="none" stroke="#15161B">
      <rect x="1" y="1" width="318" height="12" stroke-width="1.4"/>
      <g fill="#15161B"><rect x="3" y="3" width="180" height="8"/></g>
      <g stroke="#15161B" stroke-width="1" opacity="0.5">
        <path d="M 188 3 L 184 11 M 196 3 L 192 11 M 204 3 L 200 11 M 212 3 L 208 11 M 220 3 L 216 11 M 228 3 L 224 11 M 236 3 L 232 11 M 244 3 L 240 11 M 252 3 L 248 11 M 260 3 L 256 11 M 268 3 L 264 11 M 276 3 L 272 11 M 284 3 L 280 11 M 292 3 L 288 11 M 300 3 L 296 11 M 308 3 L 304 11 M 316 3 L 312 11"/>
      </g>
    </svg>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);">57 / 100</span>
  </div>
</div></body></html>
