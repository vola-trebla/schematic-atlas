<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Component — Numbered Steps</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:240px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;flex-direction:column;justify-content:center;gap:12px;">
  
    <div class="row-tight" style="gap:14px;">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:13px;flex-shrink:0;">1</span>
      <span style="font-family:var(--font-hand);font-size:17px;color:var(--ink);">Pipe the server in</span>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);margin-left:8px;">— stdio | sse | ws</span>
    </div>
    <div class="row-tight" style="gap:14px;">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:13px;flex-shrink:0;">2</span>
      <span style="font-family:var(--font-hand);font-size:17px;color:var(--ink);">Open the inspector</span>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);margin-left:8px;">— binds to localhost:7e7</span>
    </div>
    <div class="row-tight" style="gap:14px;">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:13px;flex-shrink:0;">3</span>
      <span style="font-family:var(--font-hand);font-size:17px;color:var(--ink);">See every call</span>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);margin-left:8px;">— live timeline, no scrubbing</span>
    </div>
</div></body></html>
