<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Logo Mark Sizes</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:180px;}</style>
</head>
<body class="card-pad">
<div class="row" style="gap:36px;height:100%;align-items:flex-end;">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <object data="../assets/logo.svg" type="image/svg+xml" style="width:128px;height:128px;color:var(--ink);"></object>
      <span class="mono" style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:0.05em;">128×128</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <object data="../assets/logo.svg" type="image/svg+xml" style="width:96px;height:96px;color:var(--ink);"></object>
      <span class="mono" style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:0.05em;">96×96</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <object data="../assets/logo.svg" type="image/svg+xml" style="width:64px;height:64px;color:var(--ink);"></object>
      <span class="mono" style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:0.05em;">64×64</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <object data="../assets/logo.svg" type="image/svg+xml" style="width:40px;height:40px;color:var(--ink);"></object>
      <span class="mono" style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:0.05em;">40×40</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <object data="../assets/logo.svg" type="image/svg+xml" style="width:24px;height:24px;color:var(--ink);"></object>
      <span class="mono" style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:0.05em;">24×24</span>
    </div>
  <div style="margin-left:auto;font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);max-width:18ch;line-height:1.4;">— legible down to 24 px</div>
</div></body></html>
