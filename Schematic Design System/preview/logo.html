<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:180px;}</style>
</head>
<body class="card-pad">
<div class="row" style="gap:48px;height:100%;align-items:center;">
  <div style="display:flex;align-items:center;gap:18px;">
    <object data="../assets/logo.svg" type="image/svg+xml" style="width:84px;height:84px;color:var(--ink);"></object>
    <div style="font-family:var(--font-display);font-size:64px;font-weight:700;line-height:1;letter-spacing:-0.01em;color:var(--ink);">Schematic</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;border-left:1.5px dashed var(--ink-faint);padding-left:20px;">
    <div class="label-row">mark + wordmark</div>
    <div style="font-family:var(--font-hand);font-size:13px;color:var(--ink-muted);max-width:30ch;line-height:1.45;">Single-stroke routing-line "S" with start dot and arrowhead. Wordmark set in Caveat 700.</div>
  </div>
</div></body></html>
