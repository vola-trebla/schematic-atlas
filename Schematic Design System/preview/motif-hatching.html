<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Motif — Hatching & Cross-hatch</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:200px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;align-items:center;gap:20px;">
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div style="width:120px;height:80px;background-image:repeating-linear-gradient(45deg,#15161B 0 1px,transparent 1px 5px);"></div>
    <span class="label-row">hatch 45°</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);">spacing 5px</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div style="width:120px;height:80px;background-image:repeating-linear-gradient(45deg,#15161B 0 1px,transparent 1px 5px), repeating-linear-gradient(-45deg,#15161B 0 1px,transparent 1px 5px);"></div>
    <span class="label-row">cross-hatch</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);">+45° / -45°</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div style="width:120px;height:80px;background-image:repeating-linear-gradient(0deg,#15161B 0 1px,transparent 1px 6px);"></div>
    <span class="label-row">rule lines</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);">notebook</span>
  </div>
  <div style="flex:1;font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);max-width:24ch;line-height:1.45;">
    Hatching fills "off" zones — disabled, shadowed, redacted. Never used as decoration.
  </div>
</div></body></html>
