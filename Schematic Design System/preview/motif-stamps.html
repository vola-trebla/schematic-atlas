<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Motif — Stamps</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:200px;}</style>
</head>
<body class="card-pad">
<div class="row" style="height:100%;align-items:center;justify-content:flex-start;gap:32px;">
  <div style="font-family:var(--font-stamp);font-size:30px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-red);border:2.5px solid var(--ink-red);padding:4px 12px;display:inline-block;transform:rotate(-3deg);opacity:0.85;">DRAFT</div>
  <div style="font-family:var(--font-stamp);font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink);border:2.5px solid var(--ink);padding:4px 12px;display:inline-block;transform:rotate(2deg);opacity:0.85;">v0.3</div>
  <div style="font-family:var(--font-stamp);font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-blue);border:2.5px solid var(--ink-blue);padding:4px 12px;display:inline-block;transform:rotate(-2deg);opacity:0.85;">EXPERIMENTAL</div>
  <span style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);max-width:22ch;line-height:1.4;">— red is canonical. Rotation ≤ 4°.</span>
</div></body></html>
