<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Motion Tokens</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:220px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;flex-direction:column;justify-content:center;gap:12px;">
  <span class="label-row">duration</span>
  
    <div style="display:grid;grid-template-columns:120px 70px 1fr;gap:14px;align-items:center;">
      <span class="label-row" style="color:var(--ink);">dur-fast</span>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);">120ms</span>
      <span style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);">— hover</span>
    </div>
    <div style="display:grid;grid-template-columns:120px 70px 1fr;gap:14px;align-items:center;">
      <span class="label-row" style="color:var(--ink);">dur-base</span>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);">180ms</span>
      <span style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);">— reveal</span>
    </div>
    <div style="display:grid;grid-template-columns:120px 70px 1fr;gap:14px;align-items:center;">
      <span class="label-row" style="color:var(--ink);">dur-draw</span>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);">220ms</span>
      <span style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);">— stroke-draw</span>
    </div>
    <div style="display:grid;grid-template-columns:120px 70px 1fr;gap:14px;align-items:center;">
      <span class="label-row" style="color:var(--ink);">dur-slow</span>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);">420ms</span>
      <span style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);">— full diagram</span>
    </div>
  <div style="display:grid;grid-template-columns:120px 1fr;gap:14px;align-items:center;margin-top:4px;">
    <span class="label-row" style="color:var(--ink);">ease-pen</span>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);">cubic-bezier(0.7, 0, 0.3, 1)  · confident hand, no bounce</span>
  </div>
</div></body></html>
