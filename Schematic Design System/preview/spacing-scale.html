<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing — 5mm Grid Scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:280px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;flex-direction:column;justify-content:center;gap:10px;">
  <span class="label-row">spacing scale</span>
  
    <div style="display:grid;grid-template-columns: 80px 50px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">sp-1</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">4px</span>
      <div style="height:14px;width:4px;background:var(--ink);"></div>
    </div>
    <div style="display:grid;grid-template-columns: 80px 50px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">sp-2</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">8px</span>
      <div style="height:14px;width:8px;background:var(--ink);"></div>
    </div>
    <div style="display:grid;grid-template-columns: 80px 50px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">sp-3</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">12px</span>
      <div style="height:14px;width:12px;background:var(--ink);"></div>
    </div>
    <div style="display:grid;grid-template-columns: 80px 50px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">sp-4</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">20px</span>
      <div style="height:14px;width:20px;background:var(--ink);"></div>
    </div>
    <div style="display:grid;grid-template-columns: 80px 50px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">sp-5</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">32px</span>
      <div style="height:14px;width:32px;background:var(--ink);"></div>
    </div>
    <div style="display:grid;grid-template-columns: 80px 50px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">sp-6</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">52px</span>
      <div style="height:14px;width:52px;background:var(--ink);"></div>
    </div>
    <div style="display:grid;grid-template-columns: 80px 50px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">sp-7</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">84px</span>
      <div style="height:14px;width:84px;background:var(--ink);"></div>
    </div>
    <div style="display:grid;grid-template-columns: 80px 50px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">sp-8</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">128px</span>
      <div style="height:14px;width:128px;background:var(--ink);"></div>
    </div>
</div></body></html>
