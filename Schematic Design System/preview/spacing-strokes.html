<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing — Stroke Weights</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:220px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;flex-direction:column;justify-content:center;gap:14px;">
  <span class="label-row">stroke weights — ink only</span>
  
    <div style="display:grid;grid-template-columns: 100px 70px 220px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">hair</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">1.0px</span>
      <svg width="220" height="6" viewBox="0 0 220 6"><line x1="0" y1="3" x2="220" y2="3" stroke="#15161B" stroke-width="1" stroke-linecap="round"/></svg>
      <span style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);">dimension lines, dividers</span>
    </div>
    <div style="display:grid;grid-template-columns: 100px 70px 220px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">rule</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">1.5px</span>
      <svg width="220" height="6" viewBox="0 0 220 6"><line x1="0" y1="3" x2="220" y2="3" stroke="#15161B" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);">default — borders, cards, inputs</span>
    </div>
    <div style="display:grid;grid-template-columns: 100px 70px 220px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">bold</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">2.0px</span>
      <svg width="220" height="6" viewBox="0 0 220 6"><line x1="0" y1="3" x2="220" y2="3" stroke="#15161B" stroke-width="2" stroke-linecap="round"/></svg>
      <span style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);">active state, focus underline</span>
    </div>
    <div style="display:grid;grid-template-columns: 100px 70px 220px 1fr;align-items:center;gap:14px;">
      <span class="label-row" style="color:var(--ink);">diagram</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);">2.5px</span>
      <svg width="220" height="6" viewBox="0 0 220 6"><line x1="0" y1="3" x2="220" y2="3" stroke="#15161B" stroke-width="2.5" stroke-linecap="round"/></svg>
      <span style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);">schematic primary stroke</span>
    </div>
</div></body></html>
