<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Color — Accent Inks</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:180px;}</style>
</head>
<body class="card-pad">
<div class="grid-swatches" style="grid-template-columns: repeat(5,1fr);height:100%;align-content:center;">
  
    <div class="swatch">
      <div class="chip" style="background:#B43A2A;"></div>
      <span class="var">--ink-red</span>
      <span class="hex">#B43A2A</span>
      <span class="name" style="color:var(--ink-muted);">warn / stamp</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#D77565;"></div>
      <span class="var">--ink-red-soft</span>
      <span class="hex">#D77565</span>
      <span class="name" style="color:var(--ink-muted);">soft red</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#26537B;"></div>
      <span class="var">--ink-blue</span>
      <span class="hex">#26537B</span>
      <span class="name" style="color:var(--ink-muted);">annotation</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#6B8FB4;"></div>
      <span class="var">--ink-blue-soft</span>
      <span class="hex">#6B8FB4</span>
      <span class="name" style="color:var(--ink-muted);">soft blue</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#3F6E3A;"></div>
      <span class="var">--ink-green</span>
      <span class="hex">#3F6E3A</span>
      <span class="name" style="color:var(--ink-muted);">success</span>
    </div>
</div></body></html>
