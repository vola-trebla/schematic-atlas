<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Color — Highlighter</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:200px;}</style>
</head>
<body class="card-pad">
<div class="row" style="gap:36px;height:100%;align-items:center;">
  <div class="swatch" style="width:140px;">
    <div class="chip" style="background:#F2D957;"></div>
    <span class="var">--hl-yellow</span>
    <span class="hex">#F2D957</span>
    <span class="name" style="color:var(--ink-muted);">solid</span>
  </div>
  <div class="swatch" style="width:140px;">
    <div class="chip" style="background:rgba(242,217,87,0.70);"></div>
    <span class="var">--hl-yellow-a</span>
    <span class="hex">rgba(.. / 70%)</span>
    <span class="name" style="color:var(--ink-muted);">marker swipe</span>
  </div>
  <div style="flex:1;font-family:var(--font-hand);font-size:18px;line-height:1.6;color:var(--ink);max-width:38ch;">
    A pocket inspector for <mark>MCP tools</mark>. Pipe any server in.
    See <mark>every call</mark>, every payload, every failure.
  </div>
</div></body></html>
