<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Color — Ink</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:180px;}</style>
</head>
<body class="card-pad">
<div class="grid-swatches" style="grid-template-columns: repeat(5,1fr);height:100%;align-content:center;">
  
    <div class="swatch">
      <div class="chip" style="background:#15161B;"></div>
      <span class="var">--ink</span>
      <span class="hex">#15161B</span>
      <span class="name" style="color:var(--ink-muted);">primary</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#2E2F36;"></div>
      <span class="var">--ink-soft</span>
      <span class="hex">#2E2F36</span>
      <span class="name" style="color:var(--ink-muted);">secondary</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#6A6962;"></div>
      <span class="var">--ink-muted</span>
      <span class="hex">#6A6962</span>
      <span class="name" style="color:var(--ink-muted);">tertiary</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#ACA694;"></div>
      <span class="var">--ink-faint</span>
      <span class="hex">#ACA694</span>
      <span class="name" style="color:var(--ink-muted);">disabled / hatch</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#C9C2AE;"></div>
      <span class="var">--ink-ghost</span>
      <span class="hex">#C9C2AE</span>
      <span class="name" style="color:var(--ink-muted);">ghost stroke</span>
    </div>
</div></body></html>
