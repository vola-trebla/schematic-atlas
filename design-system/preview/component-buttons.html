<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Component — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:220px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;flex-direction:column;justify-content:center;gap:18px;">
  <div class="row" style="gap:18px;align-items:center;">
    <span style="position:relative;display:inline-block;">
      <button style="font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:1.5px solid var(--ink);padding:10px 18px;cursor:pointer;">Connect tool</button>
      <span style="position:absolute;inset:0;border:1.5px solid var(--ink-faint);transform:translate(3px,3px);z-index:-1;"></span>
    </span>
    <span style="position:relative;display:inline-block;">
      <button style="font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;background:var(--paper-bright);color:var(--ink);border:1.5px solid var(--ink);padding:10px 18px;cursor:pointer;">View log</button>
      <span style="position:absolute;inset:0;border:1.5px solid var(--ink-faint);transform:translate(3px,3px);z-index:-1;"></span>
    </span>
    <button style="font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;background:transparent;color:var(--ink);border:0;padding:10px 4px;cursor:pointer;border-bottom:1.5px solid var(--ink);">Cancel</button>
    <button style="font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;background:transparent;color:var(--ink-red);border:1.5px solid var(--ink-red);padding:10px 18px;cursor:pointer;">Stop stream</button>
  </div>
  <div class="row" style="gap:32px;align-items:center;">
    <span class="label-row">states →</span>
    <span style="position:relative;display:inline-block;">
      <button style="font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;background:var(--paper-bright);color:var(--ink);border:1.5px solid var(--ink);padding:10px 18px;cursor:pointer;">Default</button>
      <span style="position:absolute;inset:0;border:1.5px solid var(--ink-faint);transform:translate(3px,3px);z-index:-1;"></span>
    </span>
    <span style="position:relative;display:inline-block;">
      <button style="font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;background:var(--paper-bright);color:var(--ink);border:2px solid var(--ink);padding:10px 18px;outline:2px solid var(--ink-red);outline-offset:4px;">Hover/Focus</span>
      <span style="position:absolute;inset:0;border:1.5px solid var(--ink-faint);transform:translate(3px,3px);z-index:-1;"></span>
    </span>
    <span style="position:relative;display:inline-block;transform:translate(2px,2px);">
      <button style="font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;background:var(--paper-bright);color:var(--ink);border:1.5px solid var(--ink);padding:10px 18px;">Pressed</button>
      <span style="position:absolute;inset:0;border:1.5px solid var(--ink-faint);transform:translate(3px,3px) translate(-2px,-2px);z-index:-1;"></span>
    </span>
    <span style="position:relative;display:inline-block;">
      <button disabled style="font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;background:repeating-linear-gradient(45deg,transparent 0 4px,rgba(21,22,27,0.12) 4px 5px),var(--paper-bright);color:var(--ink-faint);border:1.5px solid var(--ink-faint);padding:10px 18px;cursor:not-allowed;">Disabled</button>
    </span>
  </div>
</div></body></html>
