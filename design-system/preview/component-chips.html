<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Component — Chips & Tags</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:200px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;flex-direction:column;justify-content:center;gap:14px;">
  <div class="row" style="gap:10px;">
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.10em;text-transform:uppercase;color:var(--ink);background:var(--paper-bright);border:1.4px solid var(--ink);border-radius:999px;padding:2px 10px;">tool</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.10em;text-transform:uppercase;color:var(--ink-red);background:var(--paper-bright);border:1.4px solid var(--ink-red);border-radius:999px;padding:2px 10px;">error</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.10em;text-transform:uppercase;color:var(--ink-green);background:var(--paper-bright);border:1.4px solid var(--ink-green);border-radius:999px;padding:2px 10px;">ok</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.10em;text-transform:uppercase;color:var(--ink-blue);background:var(--paper-bright);border:1.4px solid var(--ink-blue);border-radius:999px;padding:2px 10px;">draft</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.10em;text-transform:uppercase;color:var(--paper);background:var(--ink);border:1.4px solid var(--ink);border-radius:999px;padding:2px 10px;">selected</span>
  </div>
  <div class="row" style="gap:10px;">
    <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);border:1.4px solid var(--ink);padding:2px 6px;background:var(--paper-bright);">[A.01]</span>
    <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);border:1.4px solid var(--ink);padding:2px 6px;background:var(--paper-bright);">[B.02]</span>
    <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-red);border:1.4px solid var(--ink-red);padding:2px 6px;background:var(--paper-bright);">[FAIL]</span>
    <span style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);margin-left:6px;">— part-number tags (square) vs. status chips (pill)</span>
  </div>
</div></body></html>
