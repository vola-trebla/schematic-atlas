<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Motif — Arrows</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:200px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:grid;grid-template-columns: repeat(2, 1fr);grid-template-rows: auto auto;gap:20px;align-items:center;">
  <div class="row-tight" style="gap:10px;">
    <span class="label-row" style="width:80px;">right</span>
    <svg width="120" height="16" viewBox="0 0 120 16" fill="none" stroke="#15161B">
      <path d="M 1 8 L 113 8" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M 109 3 L 119 8 L 109 13" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="row-tight" style="gap:10px;">
    <span class="label-row" style="width:80px;">dashed</span>
    <svg width="120" height="16" viewBox="0 0 120 16" fill="none" stroke="#15161B">
      <path d="M 1 8 L 113 8" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="6 4"/>
      <path d="M 109 3 L 119 8 L 109 13" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="row-tight" style="gap:10px;">
    <span class="label-row" style="width:80px;">bidir</span>
    <svg width="120" height="16" viewBox="0 0 120 16" fill="none" stroke="#15161B">
      <path d="M 7 8 L 113 8" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M 109 3 L 119 8 L 109 13" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 11 3 L 1 8 L 11 13" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="row-tight" style="gap:10px;">
    <span class="label-row" style="width:80px;">kinked</span>
    <svg width="120" height="40" viewBox="0 0 120 40" fill="none" stroke="#15161B">
      <path d="M 1 8 L 60 8 L 60 32 L 113 32" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 109 27 L 119 32 L 109 37" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div></body></html>
