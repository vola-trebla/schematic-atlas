<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Motif — Callouts</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:220px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;flex-direction:column;justify-content:center;gap:18px;">
  <div class="row" style="gap:14px;">
    <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:15px;">A</span><span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:15px;">B</span><span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:15px;">C</span><span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:15px;">D</span>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:15px;">1</span><span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:15px;">2</span><span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:15px;">3</span>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:var(--ink);color:var(--paper);font-family:var(--font-mono);font-weight:600;font-size:15px;">A</span>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.8px solid var(--ink-red);color:var(--ink-red);font-family:var(--font-mono);font-weight:600;font-size:15px;">!</span>
  </div>
  <div class="row" style="gap:14px;align-items:flex-start;">
    <span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;border:1.8px solid var(--ink);font-family:var(--font-mono);font-weight:600;font-size:13px;flex-shrink:0;">A</span>
    <span style="font-family:var(--font-hand);font-size:14px;line-height:1.45;max-width:54ch;">The request id is hashed here. Same id appears on the return frame.</span>
  </div>
</div></body></html>
