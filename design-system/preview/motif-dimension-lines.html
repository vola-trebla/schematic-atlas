<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Motif — Dimension Lines</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:220px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;flex-direction:column;justify-content:center;gap:24px;">
  <div class="row" style="gap:40px;">
    <span style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;">
      <span style="font-family:var(--font-mono);font-size:12px;">142 KB</span>
      <svg width="160" height="14" viewBox="0 0 160 14" fill="none" stroke="#15161B">
        <line x1="1" y1="3" x2="1" y2="11" stroke-width="1.2"/>
        <line x1="159" y1="3" x2="159" y2="11" stroke-width="1.2"/>
        <line x1="1" y1="7" x2="159" y2="7" stroke-width="1.2"/>
        <path d="M 8 4 L 1 7 L 8 10" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 152 4 L 159 7 L 152 10" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <span style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;">
      <span style="font-family:var(--font-mono);font-size:12px;">&lt; 8 ms</span>
      <svg width="220" height="14" viewBox="0 0 220 14" fill="none" stroke="#15161B">
        <line x1="1" y1="3" x2="1" y2="11" stroke-width="1.2"/>
        <line x1="219" y1="3" x2="219" y2="11" stroke-width="1.2"/>
        <line x1="1" y1="7" x2="219" y2="7" stroke-width="1.2"/>
        <path d="M 8 4 L 1 7 L 8 10" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 212 4 L 219 7 L 212 10" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <span style="display:inline-flex;align-items:center;gap:6px;">
      <svg width="14" height="80" viewBox="0 0 14 80" fill="none" stroke="#15161B">
        <line x1="3" y1="1" x2="11" y2="1" stroke-width="1.2"/>
        <line x1="3" y1="79" x2="11" y2="79" stroke-width="1.2"/>
        <line x1="7" y1="1" x2="7" y2="79" stroke-width="1.2"/>
        <path d="M 4 8 L 7 1 L 10 8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 4 72 L 7 79 L 10 72" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span style="font-family:var(--font-mono);font-size:12px;">3 tools</span>
    </span>
  </div>
  <div style="font-family:var(--font-hand);font-style:italic;font-size:13px;color:var(--ink-blue);">— size, latency, count. Numerals only, mono.</div>
</div></body></html>
