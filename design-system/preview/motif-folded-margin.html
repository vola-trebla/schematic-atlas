<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Motif — Folded Corner & Margin Note</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:240px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:flex;align-items:center;gap:30px;">
  <div style="position:relative;width:160px;height:140px;border:1.5px solid var(--ink);">
    <svg width="32" height="32" viewBox="0 0 28 28" fill="none" stroke="#15161B" style="position:absolute;top:-1px;right:-1px;">
      <path d="M 0 0 L 28 0 L 28 28 Z" fill="#F2EDE2" stroke="none"/>
      <path d="M 28 0 L 12 0 L 28 16 Z" fill="#E8E0CE" stroke="#15161B" stroke-width="1.4" stroke-linejoin="round"/>
    </svg>
    <span style="position:absolute;top:18px;left:14px;font-family:var(--font-display);font-size:24px;line-height:1;">card.</span>
    <span style="position:absolute;bottom:14px;left:14px;font-family:var(--font-hand);font-size:13px;color:var(--ink-muted);">with folded corner</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span style="font-family:var(--font-hand);font-style:italic;font-size:14px;color:var(--ink-blue);max-width:24ch;line-height:1.45;">— page-level surfaces sport a dog-ear</span>
    <svg width="48" height="10" viewBox="0 0 48 10" fill="none" stroke="#26537B">
      <path d="M 0 5 L 44 5" stroke-width="1" stroke-dasharray="4 3" stroke-linecap="round"/>
      <circle cx="46" cy="5" r="1.8" fill="#26537B"/>
    </svg>
  </div>
</div></body></html>
