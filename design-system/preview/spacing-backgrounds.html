<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Background Utilities</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_base.css" />
<style>html,body{height:200px;}</style>
</head>
<body class="card-pad">
<div style="height:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;align-items:center;">
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div style="width:100%;height:96px;border:1.5px solid var(--ink);background-color:#F2EDE2;background-image:radial-gradient(circle at 20% 30%,rgba(20,18,12,0.05) 0 1px,transparent 1.5px),radial-gradient(circle at 70% 65%,rgba(20,18,12,0.04) 0 1px,transparent 1.5px),radial-gradient(circle at 50% 80%,rgba(20,18,12,0.04) 0 1px,transparent 1.5px);background-size:7px 7px,11px 11px,13px 13px;"></div>
    <span class="label-row">.bg-paper</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);">grain</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div style="width:100%;height:96px;border:1.5px solid var(--ink);background-color:#F2EDE2;background-image:linear-gradient(to right,#D9CFB8 1px,transparent 1px),linear-gradient(to bottom,#D9CFB8 1px,transparent 1px);background-size:20px 20px;"></div>
    <span class="label-row">.bg-grid</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);">5 mm engineering grid</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div style="width:100%;height:96px;border:1.5px solid var(--ink);background-color:#F2EDE2;background-image:radial-gradient(#D9CFB8 1.2px,transparent 1.4px);background-size:16px 16px;"></div>
    <span class="label-row">.bg-dot</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);">dot grid</span>
  </div>
</div></body></html>
