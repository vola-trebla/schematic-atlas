<script>
/* ──────────────────────────────────────────────────────────────────────────
   HYBRID-WORKFLOW EXAMPLE.
   This rich CONFIG started life as enricher output (a flat 9-tool input,
   no flow, no groups) and was then hand-polished:
     - flow step questions sharpened from the generic defaults
     - a real conditional branch added with a custom red stamp
     - group blurbs rewritten to be tool-specific
     - worked-example captions reworked to point at the next call
   The reader cannot tell which lines came from the script and which came
   from a human. That is the goal.
   ────────────────────────────────────────────────────────────────────────── */
const CONFIG = {
  name: "env-secret-exposure-analyzer",
  partTag: "ESEA",
  purpose: "Scans repositories and runtime environments for accidentally exposed secrets such as .env files, hardcoded API keys, and leaked tokens.",
  highlight: ".env files",
  repo: "https://github.com/example/env-secret-exposure-analyzer",
  package: "env-secret-exposure-analyzer",
  license: "MIT",
  stats: [["9", "tools"], ["3", "groups"], ["MIT", "license"]],

  flow: {
    input: { label: "repo", sub: "\u2190 working tree" },
    steps: [
      { n: 1, name: "scan_repo", args: "path, ignore?",
        body: "Walks the working tree with .secretignore + .gitignore applied. Matches against the bundled rule set (cloud creds, stripe, ssh keys, high-entropy strings).",
        question: "\u201cwhat's there to look at?\u201d",
        branch: {
          n: 4, name: "check_git_history",
          condition: "if HEAD is clean",
          body: "Walk back through the last N commits. A removed secret is still a leaked secret \u2014 git remembers."
        }
      },
      { n: 2, name: "analyze_severity", args: "finding_id",
        body: "Scores 0\u201310 by combining matcher confidence with the entropy of the captured value. Score \u2265 8 is treated as a real leak by default.",
        question: "\u201chow bad is it?\u201d"
      },
      { n: 3, name: "suggest_fix", args: "finding_id",
        body: "Produces a remediation snippet: the .gitignore line to add, the env replacement to swap in, or the rotation command for the matched provider.",
        question: "\u201chow do I make it stop?\u201d"
      },
    ],
  },

  groups: [
    {
      key: "scanning", title: "Scanning", icon: "search",
      blurb: "Walk the tree. Match against the rule set. Surface every candidate.",
      items: [
        { name: "scan_repo",         sub: "working tree \u2014 entry point" },
        { name: "scan_file",         sub: "single file \u2014 same matchers, scoped" },
        { name: "check_git_history", sub: "last N commits, full diff walk" },
      ],
    },
    {
      key: "analysis", title: "Analysis", icon: "bug",
      blurb: "From candidates to facts. Score, contextualise, group.",
      items: [
        { name: "list_findings",      sub: "everything from this session, paginated" },
        { name: "get_finding_detail", sub: "file, line, snippet, matcher, surrounding code" },
        { name: "analyze_severity",   sub: "matcher confidence \u00d7 entropy \u2192 0\u201310" },
        { name: "compare_baselines",  sub: "diff this run against a saved baseline.json" },
      ],
    },
    {
      key: "remediation", title: "Remediation", icon: "tool",
      blurb: "Make it stop. Generate the patch, hand off the report.",
      items: [
        { name: "suggest_fix",   sub: ".gitignore line / env swap / rotation cmd" },
        { name: "export_report", sub: "findings.json + a human-readable summary" },
      ],
    },
  ],

  notes: [
    { n: 1, condition: "filesystem access",
      body: "The scanner reads files. Don't point it at directories containing .env files you DO want to keep \u2014 add them to .secretignore first." },
    { n: 2, condition: "heuristic",
      body: "Severity scores are heuristic. A 10 means \u201chigh confidence it is a secret\u201d, not \u201ccatastrophic impact\u201d \u2014 always review before acting." },
  ],

  example: {
    lang: "json",
    code: `{
  "findings": [
    {
      "id": "f-0a7b1c",
      "file": "./apps/web/.env.production",
      "line": 12,
      "matcher": "stripe_live_secret",
      "severity": 9,
      "snippet": "STRIPE_SECRET=sk_live_*****"
    },
    {
      "id": "f-0a7b1d",
      "file": "./scripts/deploy.sh",
      "line": 4,
      "matcher": "high_entropy_string",
      "severity": 6,
      "snippet": "API_TOKEN=ya29.A0AfH6S\u2026"
    }
  ]
}`,
    captions: [
      "Output of list_findings. Two findings, sorted by severity descending.",
      "Score 9 with matcher stripe_live_secret means \u201chigh-confidence leak\u201d. The next call is analyze_severity on f-0a7b1c, then suggest_fix.",
    ],
  },

  install: {
    npm: "npm install -g env-secret-exposure-analyzer",
    pnpm: "pnpm add -g env-secret-exposure-analyzer",
  },
  run: "env-secret-exposure-analyzer scan ./",
  worksWith: ["any MCP client", "Claude Desktop", "Cursor", "node \u2265 18"],
};
</script>
