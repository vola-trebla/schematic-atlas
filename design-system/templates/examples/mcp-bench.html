<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  body { margin: 0; min-height: 100vh; background: var(--paper); }
  .page-shell {
    max-width: 1180px; margin: 0 auto; padding: 0 84px;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(20,18,12,0.04) 0 1px, transparent 1.5px),
      radial-gradient(circle at 70% 65%, rgba(20,18,12,0.03) 0 1px, transparent 1.5px),
      radial-gradient(circle at 50% 80%, rgba(20,18,12,0.03) 0 1px, transparent 1.5px);
    background-size: 7px 7px, 11px 11px, 13px 13px;
    position: relative;
  }
  .page-shell::before, .page-shell::after {
    content: ""; position: absolute; top: 0; bottom: 0; width: 1px;
    background: rgba(21,22,27,0.10); pointer-events: none;
  }
  .page-shell::before { left: 36px; }
  .page-shell::after  { right: 36px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
const CONFIG = {
  "name": "mcp-bench",
  "partTag": "BENCH",
  "purpose": "Reproducible benchmarks for MCP servers — record a scenario, replay, diff two runs.",
  "highlight": "Reproducible benchmarks",
  "repo": "https://github.com/example/mcp-bench",
  "package": "mcp-bench",
  "license": "MIT",
  "stats": [
    [
      "1 yaml",
      "scenario"
    ],
    [
      "100k",
      "calls / run"
    ],
    [
      "JSON",
      "report"
    ]
  ],
  "flow": {
    "input": {
      "label": "scenario.yaml",
      "sub": "← load workload"
    },
    "steps": [
      {
        "n": 1,
        "name": "load_scenario",
        "args": "path",
        "body": "Parse the yaml. Resolve target server. Pre-allocate the histogram and HAR-like log file.",
        "question": "“what workload?”"
      },
      {
        "n": 2,
        "name": "drive",
        "args": "target, N",
        "body": "Spawn the target, open transport, run N calls. Records wall-clock time, payload size, status for each.",
        "question": "“how does it run?”"
      },
      {
        "n": 3,
        "name": "report",
        "args": "out",
        "body": "Emit a single JSON: per-tool histograms, p50/p99, throughput, outliers. Stable schema — mcp-bench diff consumes it.",
        "question": "“the output?”"
      }
    ]
  },
  "tools": [
    {
      "name": "run",
      "sub": "scenario.yaml → report.json"
    },
    {
      "name": "diff",
      "sub": "a.json b.json → what changed"
    },
    {
      "name": "summarize",
      "sub": "report.json → p50/p99 + outliers"
    }
  ],
  "install": {
    "npm": "npm install -g mcp-bench",
    "cargo": "cargo install mcp-bench"
  },
  "run": "mcp-bench run ./bench/read-heavy.yaml",
  "worksWith": [
    "any MCP server",
    "node ≥ 18",
    "macOS · Linux"
  ]
};
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../../assets/schematic.jsx"></script>
<script type="text/babel" src="../protocol-page.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(<ProtocolPage config={CONFIG} />);
</script>
</body>
</html>
