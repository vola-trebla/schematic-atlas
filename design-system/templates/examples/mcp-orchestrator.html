<body>
<div id="root"></div>

<script>
const CONFIG = {
  "name": "mcp-orchestrator",
  "partTag": "ORCH",
  "purpose": "Mounts N upstream MCP servers behind a single composite, with namespacing and crash isolation.",
  "highlight": "single composite",
  "repo": "https://github.com/example/mcp-orchestrator",
  "package": "mcp-orchestrator",
  "license": "Apache-2.0",
  "stats": [
    [
      "1 conn",
      "downstream"
    ],
    [
      "N tools",
      "merged"
    ],
    [
      "< 2 ms",
      "overhead"
    ]
  ],
  "flow": {
    "input": {
      "label": "call(fs.read)",
      "sub": "← from agent"
    },
    "steps": [
      {
        "n": 1,
        "name": "route_by_namespace",
        "args": "tool_name",
        "body": "Parse the part before the first dot. \"fs.read\" → upstream \"fs\", method \"read\". O(1) lookup.",
        "question": "“which upstream?”"
      },
      {
        "n": 2,
        "name": "forward",
        "args": "upstream, method, args",
        "body": "Open or reuse the connection to the upstream. Forward verbatim. The orchestrator is transparent to both sides.",
        "question": "“who runs it?”",
        "branch": {
          "n": 4,
          "name": "structured_error",
          "condition": "if upstream down",
          "body": "Return MCP-spec error tagged with namespace. Other namespaces stay healthy — no cascade failure."
        }
      },
      {
        "n": 3,
        "name": "relay_response",
        "args": "result",
        "body": "Tag with upstream id (for tracing). Stream back to agent.",
        "question": "“how does it land?”"
      }
    ]
  },
  "tools": [
    {
      "name": "list_upstreams",
      "sub": "every mounted server + health"
    },
    {
      "name": "reload_config",
      "sub": "re-read yaml on SIGHUP — no client restart"
    },
    {
      "name": "*.* (passthrough)",
      "sub": "any namespaced tool from any upstream"
    }
  ],
  "install": {
    "npm": "npm install -g mcp-orchestrator",
    "pnpm": "pnpm add -g mcp-orchestrator"
  },
  "run": "mcp-orchestrator --config ./tools.yaml",
  "worksWith": [
    "any MCP client",
    "any MCP server (as upstream)",
    "node ≥ 20"
  ]
};
</script>
